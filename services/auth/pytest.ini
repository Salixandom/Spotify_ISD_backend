[pytest]
# Pytest configuration for the Auth service

python_files = test_*.py
python_classes = Test*
python_functions = test_*

testpaths = tests

addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

markers =
    django_db: Marks test as requiring database access
    unit: Marks test as a unit test
    integration: Marks test as an integration test

log_cli = false
log_cli_level = INFO

django_settings_module = core.settings
