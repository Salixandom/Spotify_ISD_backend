# Render.com Deployment Configuration
# https://render.com/docs/yaml-spec

services:
  # PostgreSQL Database
  - type: pserv
    name: spotify-db
    env: docker
    plan: starter  # Change to production plan as needed
    envVars:
      - key: POSTGRES_DB
        value: spotifydb
      - key: POSTGRES_USER
        generateValue: true
      - key: POSTGRES_PASSWORD
        generateValue: true

  # Auth Service
  - type: pserv
    name: auth-service
    env: docker
    plan: free
    dockerContext: ./services/auth
    dockerfilePath: ./services/auth/Dockerfile
    envVars:
      - key: SERVICE_PORT
        value: 8001
      - key: DB_HOST
        fromService:
          name: spotify-db
          type: pserv
          property: host
      - key: DB_PORT
        fromService:
          name: spotify-db
          type: pserv
          property: port
      - key: DB_NAME
        fromService:
          name: spotify-db
          type: pserv
          envVarKey: POSTGRES_DB
      - key: DB_USER
        fromService:
          name: spotify-db
          type: pserv
          envVarKey: POSTGRES_USER
      - key: DB_PASSWORD
        fromService:
          name: spotify-db
          type: pserv
          envVarKey: POSTGRES_PASSWORD
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.onrender.com"
    domains:
      - auth-yourdomain.onrender.com

  # Core Service (Playlist + Track + Search)
  - type: pserv
    name: core-service
    env: docker
    plan: free
    dockerContext: ./services/core
    dockerfilePath: ./services/core/Dockerfile
    envVars:
      - key: SERVICE_PORT
        value: 8002
      - key: DB_HOST
        fromService:
          name: spotify-db
          type: pserv
          property: host
      - key: DB_PORT
        fromService:
          name: spotify-db
          type: pserv
          property: port
      - key: DB_NAME
        fromService:
          name: spotify-db
          type: pserv
          envVarKey: POSTGRES_DB
      - key: DB_USER
        fromService:
          name: spotify-db
          type: pserv
          envVarKey: POSTGRES_USER
      - key: DB_PASSWORD
        fromService:
          name: spotify-db
          type: pserv
          envVarKey: POSTGRES_PASSWORD
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.onrender.com"
      - key: AUTH_SERVICE_URL
        value: http://auth-service:8001
    domains:
      - core-yourdomain.onrender.com

  # Collaboration Service
  - type: pserv
    name: collab-service
    env: docker
    plan: free
    dockerContext: ./services/collaboration
    dockerfilePath: ./services/collaboration/Dockerfile
    envVars:
      - key: SERVICE_PORT
        value: 8003
      - key: DB_HOST
        fromService:
          name: spotify-db
          type: pserv
          property: host
      - key: DB_PORT
        fromService:
          name: spotify-db
          type: pserv
          property: port
      - key: DB_NAME
        fromService:
          name: spotify-db
          type: pserv
          envVarKey: POSTGRES_DB
      - key: DB_USER
        fromService:
          name: spotify-db
          type: pserv
          envVarKey: POSTGRES_USER
      - key: DB_PASSWORD
        fromService:
          name: spotify-db
          type: pserv
          envVarKey: POSTGRES_PASSWORD
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.onrender.com"
      - key: AUTH_SERVICE_URL
        value: http://auth-service:8001
    domains:
      - collab-yourdomain.onrender.com
