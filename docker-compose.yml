version: '3.8'

services:

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: spotifydb
      POSTGRES_USER: spotifyuser
      POSTGRES_PASSWORD: spotifypass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  traefik:
    image: traefik:latest
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=spotify_isd_backend_default"
      - "--entrypoints.web.address=:80"
      - "--api.insecure=true"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default
    depends_on:
      - auth
      - core
      - collaboration
      - playback

  auth:
    build: ./services/auth
    # Entrypoint script automatically runs migrations on startup
    # Set RUN_MIGRATIONS=false in .env to skip auto-migrations
    command: uv run uvicorn core.asgi:application --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./services/auth:/app
    ports:
      - "8001:8001"
    env_file:
      - ./services/auth/.env
    environment:
      - RUN_MIGRATIONS=true  # Auth service has models and requires migrations
      - DJANGO_SETTINGS_MODULE=core.settings
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/api/auth`)"
      - "traefik.http.services.auth.loadbalancer.server.port=8001"
    depends_on:
      - db

  core:
    build: ./services/core
    # Entrypoint script automatically runs migrations on startup
    # Set RUN_MIGRATIONS=false in .env to skip auto-migrations
    command: uv run uvicorn core.asgi:application --host 0.0.0.0 --port 8002 --reload
    volumes:
      - ./services/core:/app
    ports:
      - "8002:8002"
    env_file:
      - ./services/core/.env
    environment:
      - RUN_MIGRATIONS=true  # Core service runs its own migrations
      - DJANGO_SETTINGS_MODULE=core.settings
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core-playlists.rule=PathPrefix(`/api/playlists`)"
      - "traefik.http.routers.core-playlists.service=core-svc"
      - "traefik.http.routers.core-tracks.rule=PathPrefix(`/api/tracks`)"
      - "traefik.http.routers.core-tracks.service=core-svc"
      - "traefik.http.routers.core-search.rule=PathPrefix(`/api/search`)"
      - "traefik.http.routers.core-search.service=core-svc"
      - "traefik.http.routers.core-history.rule=PathPrefix(`/api/history`)"
      - "traefik.http.routers.core-history.service=core-svc"
      - "traefik.http.routers.core-health.rule=PathPrefix(`/api/core`)"
      - "traefik.http.routers.core-health.service=core-svc"
      - "traefik.http.services.core-svc.loadbalancer.server.port=8002"
    depends_on:
      - db

  collaboration:
    build: ./services/collaboration
    # Entrypoint script automatically runs migrations on startup
    # Set RUN_MIGRATIONS=false in .env to skip auto-migrations
    command: uv run uvicorn core.asgi:application --host 0.0.0.0 --port 8003 --reload
    volumes:
      - ./services/collaboration:/app
    ports:
      - "8003:8003"
    env_file:
      - ./services/collaboration/.env
    environment:
      - RUN_MIGRATIONS=true  # Each service runs its own migrations (distributed strategy)
      - DJANGO_SETTINGS_MODULE=core.settings
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.collab.rule=PathPrefix(`/api/collab`)"
      - "traefik.http.routers.collab.service=collab-svc"
      - "traefik.http.routers.share.rule=PathPrefix(`/api/share`)"
      - "traefik.http.routers.share.service=collab-svc"
      - "traefik.http.services.collab-svc.loadbalancer.server.port=8003"
    depends_on:
      - db

  playback:
    build: ./services/playback
    # Entrypoint script automatically runs migrations on startup
    # Set RUN_MIGRATIONS=false in .env to skip auto-migrations
    command: uv run uvicorn core.asgi:application --host 0.0.0.0 --port 8004 --reload
    volumes:
      - ./services/playback:/app
    ports:
      - "8004:8004"
    env_file:
      - ./services/playback/.env
    environment:
      - RUN_MIGRATIONS=true
      - DJANGO_SETTINGS_MODULE=core.settings
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.playback.rule=PathPrefix(`/api/playback`)"
      - "traefik.http.services.playback.loadbalancer.server.port=8004"
    depends_on:
      - db

volumes:
  postgres_data:
