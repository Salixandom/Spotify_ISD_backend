[pytest]
# Pytest configuration for Spotify ISD backend

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    django_db: Marks test as requiring database access
    unit: Marks test as a unit test
    integration: Marks test as an integration test
    performance: Marks test as a performance test

# Coverage options (if using pytest-cov)
# addopts = --cov=. --cov-report=html --cov-report=term

# Logging
log_cli = false
log_cli_level = INFO

# Django integration
django_settings_module = core.settings
