# Render.com Deployment Configuration
# https://render.com/docs/yaml-spec
#
# Configuration: Supabase (External PostgreSQL)
# All services connect to a Supabase project instead of Render's internal database

services:
  # Auth Service
  - type: pserv
    name: auth-service
    env: docker
    plan: free
    dockerContext: ./services/auth
    dockerfilePath: ./services/auth/Dockerfile
    envVars:
      - key: SERVICE_PORT
        value: 8001
      # Supabase Connection (replace with your Supabase DATABASE_URL)
      - key: DATABASE_URL
        value: postgresql://postgres:[YOUR-PASSWORD]@db.[PROJECT-REF].supabase.co:5432/postgres
        # Get this from: Supabase Dashboard → Settings → Database → Connection String
        # Format: postgresql://postgres:[YOUR-PASSWORD]@db.[PROJECT-REF].supabase.co:5432/postgres
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.onrender.com"
      - key: RUN_MIGRATIONS
        value: false  # Run migrations manually after deployment
    domains:
      - auth-yourdomain.onrender.com

  # Core Service (Playlist + Track + Search)
  - type: pserv
    name: core-service
    env: docker
    plan: free
    dockerContext: ./services/core
    dockerfilePath: ./services/core/Dockerfile
    envVars:
      - key: SERVICE_PORT
        value: 8002
      # Supabase Connection (same for all services)
      - key: DATABASE_URL
        value: postgresql://postgres:[YOUR-PASSWORD]@db.[PROJECT-REF].supabase.co:5432/postgres
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.onrender.com"
      - key: AUTH_SERVICE_URL
        value: https://auth-service.onrender.com
      - key: RUN_MIGRATIONS
        value: false
    domains:
      - core-yourdomain.onrender.com

  # Collaboration Service
  - type: pserv
    name: collab-service
    env: docker
    plan: free
    dockerContext: ./services/collaboration
    dockerfilePath: ./services/collaboration/Dockerfile
    envVars:
      - key: SERVICE_PORT
        value: 8003
      # Supabase Connection (same for all services)
      - key: DATABASE_URL
        value: postgresql://postgres:[YOUR-PASSWORD]@db.[PROJECT-REF].supabase.co:5432/postgres
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.onrender.com"
      - key: AUTH_SERVICE_URL
        value: https://auth-service.onrender.com
      - key: RUN_MIGRATIONS
        value: false
    domains:
      - collab-yourdomain.onrender.com

# Note: To use Render's internal PostgreSQL instead, restore the original render.yaml
# or create a separate render-postgres.yaml file.
